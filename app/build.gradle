apply plugin: 'com.android.application'
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "org.jetbrains.kotlin.plugin.parcelize"
apply plugin: "org.jetbrains.kotlin.plugin.serialization"
apply plugin: "com.google.devtools.ksp"
apply plugin: "com.jaredsburrows.license"
if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
    apply plugin: 'com.google.firebase.crashlytics'
}

android {
    namespace 'com.hippo.ehviewer'
    testNamespace 'com.hippo.ehviewer.debug'
    compileSdk 35
//    buildToolsVersion "30.0.3"
//    ndkVersion '26.1.10909125'

    flavorDimensions "distribute"
    productFlavors {
        appRelease {
            dimension "distribute"
        }
//        googlePlay {
//            dimension "distribute"
//        }
    }

    defaultConfig {
        applicationId "com.lanraragi.reader"
        minSdkVersion 28
        targetSdkVersion 35
        versionCode 12
        versionName "1.9.0"
        vectorDrawables.useSupportLibrary = true
        resourceConfigurations += ['en', 'zh', 'zh-rCN', 'zh-rHK', 'zh-rTW', 'es', 'ja', 'ko', 'fr', 'de', 'th']
        testOptions.unitTests.includeAndroidResources = true
        // multiDexEnabled removed: minSdk 23 natively supports it
        ndk {
            moduleName "native-lib"
            abiFilters "arm64-v8a"
        }
        externalNativeBuild {
            cmake {
//                path 'src/main/cpp/CMakeLists.txt'
                cppFlags ''
            }
        }
    }

    lint {
        disable 'MissingTranslation', 'ExtraTranslation'
        abortOnError true
        checkReleaseBuilds true
    }

    signingConfigs {
        release {
            def props = new Properties()
            def propsFile = rootProject.file('local.properties')
            if (propsFile.exists()) {
                props.load(new FileInputStream(propsFile))
            }
            storeFile rootProject.file(props.getProperty('RELEASE_STORE_FILE', 'keystore/release.jks'))
            storePassword props.getProperty('RELEASE_STORE_PASSWORD', '')
            keyAlias props.getProperty('RELEASE_KEY_ALIAS', 'lrreader')
            keyPassword props.getProperty('RELEASE_KEY_PASSWORD', '')
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField 'String', 'FILE_PROVIDER_AUTHORITY', '"com.lanraragi.reader.fileprovider"'
        }
        debug {
            applicationIdSuffix ".debug"
            buildConfigField 'String', 'FILE_PROVIDER_AUTHORITY', '"com.lanraragi.reader.debug.fileprovider"'
        }
    }

    externalNativeBuild {
        cmake {
//            version '3.30.5'
            path file('src/main/cpp/CMakeLists.txt')
        }
    }
//    sourceSets {
//        main {
//            java.srcDirs += 'src/main/java-gen'
//        }
//    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        viewBinding true
    }

}

//tasks.withType(JavaCompile) {
//    task -> task.dependsOn copyNotice
//}

dependencies {
//    测试工具
//    debugCompileOnly 'com.gu.android:toolargetool:0.3.0'

    implementation 'com.google.android.material:material:1.13.0'

    // app使用情况数据收集
    // Import the BoM for the Firebase platform
//    implementation platform('com.google.firebase:firebase-bom:32.1.0')

    // Firebase disabled for LRReader
//    implementation 'com.google.firebase:firebase-crashlytics:20.0.3'
//    implementation 'com.google.firebase:firebase-analytics:23.0.0'

    // JSON parsing for LANraragi REST API
    implementation 'com.google.code.gson:gson:2.11.0'

    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.activity:activity:1.10.1"
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'androidx.biometric:biometric:1.1.0'
    implementation "androidx.browser:browser:1.8.0"
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation "androidx.fragment:fragment:1.8.6"
    implementation "androidx.preference:preference-ktx:1.2.1"
    implementation 'androidx.recyclerview:recyclerview:1.4.0'

    // https://mvnrepository.com/artifact/androidx.core/core-ktx
    implementation 'androidx.core:core-ktx:1.15.0'
    // Kotlin Coroutines (Step 3.2 — structured concurrency for LRREngine)
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'
    // lifecycleScope for Fragment coroutines (viewLifecycleOwner.lifecycleScope)
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    // kotlinx-serialization (Step 3.4 — replace Gson for LRR data classes)
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.8.1'


//     https://mvnrepository.com/artifact/com.fpliu.ndk.pkg.prefab.android.21/libpng
    implementation 'com.fpliu.ndk.pkg.prefab.android.21:libpng:1.6.37'
