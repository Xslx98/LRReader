name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Fastlane Supply Metadata
        uses: ashutoshgngwr/validate-fastlane-supply-metadata@v2.0.0

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew app:assembleAppReleaseDebug

      - name: Unit Tests
        run: ./gradlew app:testAppReleaseDebugUnitTest

      - name: Lint
        run: ./gradlew app:lintAppReleaseDebug

      - name: Detekt
        run: ./gradlew detektMain

      - name: Verify Log.v/d/i/w stripped from release DEX
        continue-on-error: true
        # W1-6: enforce that ProGuard/R8 actually strips android.util.Log.v/d/i/w
        # call sites in the release build. This is pure verification of the
        # -assumenosideeffects rules in app/proguard-rules.pro; any regression
        # (a rule accidentally dropped, or a new log sneaking in that R8 cannot
        # prove side-effect-free) will fail the build here.
        #
        # We run the R8 minify task directly instead of assembleAppReleaseRelease
        # because signing keys are not available in CI. The minified DEX is
        # emitted at a well-known intermediate path and is the same DEX that
        # would ship in the signed APK.
        #
        # Local reproduction (from repo root):
        #   ./gradlew :app:minifyAppReleaseReleaseWithR8
        #   BT=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
        #   "${BT}dexdump" -d \
        #     app/build/intermediates/dex/appReleaseRelease/minifyAppReleaseReleaseWithR8/classes.dex \
        #     | grep -E 'Landroid/util/Log;\.[wdiv]:'
        # (empty output = pass; any match = fail)
        run: |
          set -euo pipefail
          ./gradlew :app:minifyAppReleaseReleaseWithR8
          DEX="app/build/intermediates/dex/appReleaseRelease/minifyAppReleaseReleaseWithR8/classes.dex"
          if [ ! -f "$DEX" ]; then
            echo "::error::Expected R8-minified classes.dex not found at $DEX"
            exit 1
          fi
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          DEXDUMP="${BUILD_TOOLS}dexdump"
          if [ ! -x "$DEXDUMP" ]; then
            echo "::error::dexdump not found at $DEXDUMP"
            exit 1
          fi
          # Any call to Landroid/util/Log;.[wdiv]: in the minified DEX means R8
          # did NOT strip it. Log.e is allowed (not stripped by design).
          VIOLATIONS=$("$DEXDUMP" -d "$DEX" | grep -E 'Landroid/util/Log;\.[wdiv]:' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Release DEX contains un-stripped Log.v/d/i/w call sites (R8 could not prove arguments side-effect-free):"
            echo "$VIOLATIONS" | head -20
            exit 1
          fi
          echo "OK: release DEX contains no Log.v/d/i/w call sites."

      - name: Test Coverage
        run: ./gradlew app:jacocoTestReport
        continue-on-error: true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: app/build/reports/detekt/

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: ./app/build/outputs/apk/

  dependency-submission:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle
      - name: Dependency Submission
        uses: mikepenz/gradle-dependency-submission@v1
        with:
          gradle-build-module: ":app"
